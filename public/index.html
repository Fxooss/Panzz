<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanzzxAutoOrder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <!-- HEADER -->
    <header class="top-header">
        <div class="header-inner">
            <div class="logo">⚡ PanzzxAutoOrder</div>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                <button class="btn btn-sec" onclick="openDashboard()">Orders</button>
                <button class="btn-admin" onclick="promptSellerLogin()">P</button>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="main-container">
        <div class="market-title">
            <h2>Digital Market</h2>
            <p>Fast, Secure, Automated.</p>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </main>

    <!-- DETAIL MODAL -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-content detail-modal">
            <button class="close-modal" onclick="closeDetailModal()">×</button>
            <div class="detail-image" id="detailImg"></div>
            <h2 id="detailTitle"></h2>
            <p id="detailDesc"></p>
            <span class="price-badge" id="detailPrice"></span>
            <div class="action-wrapper" id="actionWrapper"></div>
        </div>
    </div>

    <!-- TASK MODAL (SUB2UNLOCK STYLE) -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal-content task-modal">
            <button class="close-modal" onclick="closeTaskModal()">×</button>
            <div class="task-header">
                <h3>🎁 Klaim Gratis</h3>
                <p>Selesaikan task di bawah untuk mendapat produk</p>
            </div>
            <div class="task-body" id="taskListContainer"></div>
            <div class="task-footer">
                <button class="btn-claim" id="btnClaim" disabled onclick="claimFree()">KLAIM PRODUK</button>
            </div>
        </div>
    </div>

    <!-- VERIF MODAL -->
    <div class="modal-overlay" id="verifModal">
        <div class="modal-content detail-modal">
            <button class="close-modal" onclick="closeVerifModal()">×</button>
            <h3>🚀 Pembayaran</h3>
            <p style="color:var(--text-secondary); margin: 10px 0">Produk: <strong id="verifProdName"></strong></p>
            <input type="text" id="buyerNameInput" placeholder="Nama Kamu" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; background:var(--bg-secondary); color:var(--text-primary)">
            <div class="file-drop" id="uploadArea" style="padding:20px; margin-bottom:10px">
                <span>📁 Upload Bukti</span>
                <input type="file" id="proofInput" hidden accept="image/*">
            </div>
            <img src="" id="previewImg" class="preview-img" style="display:none; width:100%; border-radius:8px">
            <button class="btn-action btn-rek" style="margin-top:10px" onclick="submitProof()">Kirim</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="modal-overlay" id="dashboardModal">
        <div class="modal-content task-modal">
            <div class="task-header"><h3>📦 Orders</h3></div>
            <div class="task-body" id="dashBody"></div>
            <div class="task-footer"><button class="btn btn-sec" onclick="closeDashboard()" style="width:auto">Tutup</button></div>
        </div>
    </div>

    <!-- LOGIN SIDEBAR -->
    <div class="sidebar-overlay" id="loginSidebar">
        <div class="sidebar-content">
            <h3>🔐 Seller</h3>
            <input type="password" id="sellerPass" maxlength="5" placeholder="*****" style="width:100%; padding:12px; margin:15px 0; border-radius:8px; border:1px solid var(--accent); background:var(--bg-secondary); color:var(--text-primary); text-align:center; letter-spacing:5px; font-size:20px">
            <button class="btn-add" style="width:100%" onclick="verifySeller()">Masuk</button>
            <button style="width:100%; background:none; border:none; color:var(--text-secondary); margin-top:10px; cursor:pointer" onclick="closeSidebar()">Batal</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
                </html>
