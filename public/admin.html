<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <!-- LOGIN OVERLAY (Muncul Pertama Kali) -->
    <div class="sidebar-overlay active" id="adminLoginOverlay">
        <div class="sidebar-content" style="width: 300px; padding: 30px; text-align: center">
            <h2>🔐 Seller Access</h2>
            <p style="color:var(--text-secondary); margin: 10px 0 20px">Masukkan password untuk lanjut.</p>
            <input type="password" id="adminPassInput" maxlength="5" placeholder="*****" style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--accent); background:var(--bg-secondary); color:var(--text-primary); text-align:center; letter-spacing:5px; font-size:20px; margin-bottom:15px">
            <button class="btn-add" style="width:100%" onclick="attemptLogin()">Masuk</button>
            <p id="loginError" style="color:var(--danger); margin-top:10px; display:none">Password salah!</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="sidebar-logo">⚙️ PanzzxConfig</div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" onclick="showSection('products')">📦 Produk</a>
                <a href="#" class="nav-item" onclick="showSection('orders')">💰 Orders</a>
                <a href="#" class="nav-item" onclick="showSection('settings')">⚙️ Settings</a>
            </nav>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </aside>

        <main class="admin-main">
            <!-- PRODUCTS -->
            <section id="section-products" class="admin-section active">
                <h2>Tambah Produk</h2>
                <div class="form-grid">
                    <input type="text" id="inpImg" placeholder="URL Gambar (Opsional)">
                    <input type="text" id="inpName" placeholder="Nama Produk">
                    <input type="text" id="inpPrice" placeholder="Harga (0 = Gratis)">
                    <textarea id="inpDesc" placeholder="Deskripsi" style="grid-column: span 2"></textarea>
                    
                    <div class="form-group full-width" style="background: var(--bg-secondary); padding: 15px; border-radius: 12px;">
                        <label>🔗 Link Task (Khusus Produk Gratis)</label>
                        <div id="teleLinksContainer" style="margin-top:10px; display:flex; flex-direction:column; gap:8px"></div>
                        <button type="button" onclick="addLinkInput()" style="margin-top:10px; background:transparent; border:1px dashed var(--accent); color:var(--accent); padding:8px; border-radius:8px; cursor:pointer; width:100%">+ Tambah Link</button>
                    </div>

                    <div class="file-drop" id="fileDrop" style="grid-column: span 2" onclick="document.getElementById('inpFile').click()">📂 Upload File</div>
                    <input type="file" id="inpFile" hidden>
                    <button class="btn-add" style="grid-column: span 2" onclick="addProduct()">Tambah</button>
                </div>
                <div class="product-list-admin" id="adminProdList"></div>
            </section>

            <!-- ORDERS -->
            <section id="section-orders" class="admin-section">
                <h2>Verifikasi Pembayaran</h2>
                <div id="ordersList" class="orders-list"></div>
            </section>

            <!-- SETTINGS -->
            <section id="section-settings" class="admin-section">
                <h2>Pengaturan</h2>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Nomor Rekening</label>
                        <input type="text" id="setRek">
                    </div>
                    <div class="form-group full-width">
                        <label>URL QRIS</label>
                        <input type="text" id="setQris">
                    </div>
                    <div class="form-group full-width">
                        <label>Password Login</label>
                        <input type="text" id="setPass" maxlength="5">
                    </div>
                    <button class="btn-add" style="grid-column: span 2" onclick="saveSettings()">Simpan</button>
                </div>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
    </html>
